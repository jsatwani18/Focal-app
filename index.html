<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Focal"/>
<meta name="theme-color" content="#F5F5F7"/>
<title>Focal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F5F5F7;--card:#FFF;--sep:rgba(0,0,0,.08);--sep2:rgba(0,0,0,.05);
  --ink:#1D1D1F;--ink2:#3A3A3C;--ink3:#636366;--ink4:#AEAEB2;--ink5:#D1D1D6;
  --blue:#0071E3;--blue-bg:#EBF3FD;--green:#34C759;--red:#FF3B30;
  --orange:#FF9500;--purple:#AF52DE;
  --r:18px;--rbtn:14px;--rpill:100px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;font-size:16px;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
#screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(68px + env(safe-area-inset-bottom));}
#screen::-webkit-scrollbar{display:none;}
.page{animation:fadeUp .28s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ph{padding:52px 20px 0;margin-bottom:28px;}
.ptitle{font-size:34px;font-weight:700;letter-spacing:-.5px;line-height:1.1;}
.psub{font-size:14px;color:var(--ink4);margin-top:4px;}
.sec{margin-bottom:28px;padding:0 20px;}
.slabel{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);margin-bottom:10px;padding-left:2px;}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.crow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--sep2);transition:background .1s;}
.crow:last-child{border-bottom:none;}
.crow.tap{cursor:pointer;}
.crow.tap:active{background:#F9F9FB;}
.crow.done{background:#FAFAFA;}
.csolo{padding:16px;}
.btn{width:100%;padding:15px 20px;border:none;border-radius:var(--rbtn);font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .12s;letter-spacing:-.2px;}
.btn:active{opacity:.75;transform:scale(.98);}
.btn-p{background:var(--blue);color:#fff;}
.btn-s{background:var(--blue-bg);color:var(--blue);}
.btn-g{background:var(--bg);color:var(--ink2);}
.btn-d{background:#FFF0EF;color:var(--red);}
.btn-sm{width:auto;padding:9px 18px;font-size:14px;font-weight:500;border-radius:var(--rbtn);}
.chk{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--bg);transition:all .2s ease;cursor:pointer;}
.chk.on{background:#EDFAF0;font-size:16px;color:var(--green);}
.chk.pop{animation:pop .36s ease;}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.3)}72%{transform:scale(.92)}100%{transform:scale(1)}}
.lp{font-size:15px;font-weight:500;color:var(--ink);letter-spacing:-.2px;line-height:1.3;}
.ls{font-size:12px;color:var(--ink4);margin-top:2px;}
.lp.done{color:var(--ink4);text-decoration:line-through;text-decoration-color:var(--ink5);}
.ifield{width:100%;background:transparent;border:none;outline:none;font-family:inherit;font-size:15px;color:var(--ink);letter-spacing:-.2px;}
.ifield::placeholder{color:var(--ink5);}
.iwrap{background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);}
.tafield{width:100%;background:transparent;border:none;outline:none;font-family:inherit;font-size:15px;color:var(--ink);resize:none;line-height:1.6;}
.tafield::placeholder{color:var(--ink5);}
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:.5px solid var(--sep);display:flex;justify-content:space-around;align-items:flex-end;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 10px;cursor:pointer;border:none;background:none;transition:opacity .15s;}
.ni:active{opacity:.5;}
.nicon{font-size:22px;line-height:1;filter:grayscale(1) opacity(.3);transition:filter .2s;}
.nlbl{font-size:10px;font-weight:500;color:var(--ink4);transition:color .2s;}
.ni.on .nicon{filter:none;}
.ni.on .nlbl{color:var(--blue);}
.pillrow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0 6px;}
.pillrow::-webkit-scrollbar{display:none;}
.pill{background:var(--card);border:none;border-radius:var(--rpill);padding:7px 16px;font-family:inherit;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.05);}
.pill.on{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(0,113,227,.25);}
.ttrack{width:51px;height:31px;border-radius:100px;background:var(--ink5);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.ttrack.on{background:var(--green);}
.tknob{position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:left .22s;}
.ttrack.on .tknob{left:22px;}
.emgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.embtn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:14px;border:1.5px solid transparent;background:var(--card);cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.embtn:active{transform:scale(.94);}
.embtn.on{border-color:var(--blue);background:var(--blue-bg);}
.emji{font-size:22px;line-height:1;}
.emlbl{font-size:9px;font-weight:500;color:var(--ink4);text-align:center;line-height:1.2;}
.embtn.on .emlbl{color:var(--blue);}
.wstrip{display:flex;justify-content:space-between;gap:4px;}
.wcol{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.wdlbl{font-size:10px;font-weight:500;color:var(--ink5);}
.wdot{width:100%;aspect-ratio:1;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--ink5);border:1.5px solid transparent;}
.wdot.today{border-color:var(--blue);color:var(--blue);}
.wdot.has{background:#EDFAF0;color:var(--green);}
.ptrack{height:3px;background:var(--sep);border-radius:100px;overflow:hidden;}
.pfill{height:100%;border-radius:100px;transition:width 1.2s ease;}
.sbadge{font-size:11px;font-weight:600;color:var(--orange);background:rgba(255,149,0,.1);padding:3px 8px;border-radius:100px;white-space:nowrap;}
.moverlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;animation:mfade .2s ease;}
@keyframes mfade{from{opacity:0}to{opacity:1}}
.msheet{background:#fff;border-radius:24px 24px 0 0;padding:12px 20px calc(32px + env(safe-area-inset-bottom));width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:mup .28s ease;}
.msheet::-webkit-scrollbar{display:none;}
@keyframes mup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--ink5);border-radius:100px;margin:0 auto 20px;}
.mtitle{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px;}
.msub{font-size:13px;color:var(--ink4);margin-bottom:20px;}
.icard{background:var(--card);border-radius:var(--r);padding:22px;box-shadow:var(--sh);margin-bottom:12px;}
.iauthor{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;}
.iquote{font-size:19px;font-weight:300;line-height:1.45;letter-spacing:-.3px;font-style:italic;margin-bottom:18px;}
.idiv{height:.5px;background:var(--sep);margin-bottom:14px;}
.ictx{font-size:14px;color:var(--ink3);line-height:1.7;letter-spacing:-.1px;}
.urow{background:var(--card);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);}
.uhead{display:flex;align-items:center;justify-content:space-between;padding:16px;cursor:pointer;}
.ubody{font-size:14px;color:var(--ink3);line-height:1.7;padding:0 16px 16px;display:none;}
.ubody.open{display:block;}
.chev{font-size:13px;color:var(--ink4);display:inline-block;transition:transform .2s;}
.chev.open{transform:rotate(90deg);}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.abtn{background:var(--card);border:2px solid transparent;border-radius:var(--r);padding:14px 8px;cursor:pointer;text-align:center;font-family:inherit;box-shadow:var(--sh);transition:all .15s;}
.abtn:active{transform:scale(.97);}
.abtn.on{border-color:var(--blue);background:var(--blue-bg);}
.aemoji{font-size:22px;margin-bottom:4px;}
.alabel{font-size:12px;font-weight:600;color:var(--ink2);}
.abtn.on .alabel{color:var(--blue);}
.acount{font-size:11px;color:var(--ink4);margin-top:2px;}
.wbars{display:flex;gap:3px;margin-top:10px;}
.wbar{flex:1;height:4px;border-radius:100px;background:var(--sep);}
.wbar.on{background:var(--green);}
.bcirc{width:176px;height:176px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin:0 auto 24px;transition:all 1s ease;background:var(--bg);border:2px solid var(--sep);}
.bcirc.inhale{background:#E8F5FF;border-color:#90CAF9;transform:scale(1.08);}
.bcirc.hold{background:#FFF8E1;border-color:#FFD54F;}
.bcirc.exhale{background:#E8F5E9;border-color:#A5D6A7;transform:scale(.95);}
.qcard{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border-left:3px solid var(--blue);}
.qtext{font-size:13px;color:var(--ink3);line-height:1.7;font-style:italic;}
.winscard{background:var(--ink);border-radius:var(--r);padding:20px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 24px rgba(0,0,0,.12);}
.winsnum{font-size:42px;font-weight:200;color:#fff;letter-spacing:-2px;line-height:1;}
.winslbl{font-size:13px;color:rgba(255,255,255,.5);line-height:1.4;}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.ebtn{border-radius:var(--r);padding:16px 14px;cursor:pointer;text-align:left;border:none;font-family:inherit;box-shadow:var(--sh);}
.ebtn:active{opacity:.7;}
.ustep{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;}
.unum{min-width:26px;height:26px;border-radius:50%;background:var(--bg);color:var(--ink3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.utext{font-size:14px;color:var(--ink2);line-height:1.6;}
.urgbtn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card);border-radius:14px;border:none;cursor:pointer;width:100%;margin-bottom:8px;font-family:inherit;box-shadow:var(--sh);text-align:left;}
.urgbtn:active{opacity:.7;}
.rbox{background:var(--bg);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.tring-bg{fill:none;stroke:rgba(0,0,0,.08);stroke-width:6;}
.tring-fill{fill:none;stroke-width:6;stroke-linecap:round;}
.ttime{font-size:52px;font-weight:200;letter-spacing:-3px;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums;}
.tphase{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);}
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="nav">
    <button class="ni on" id="n-hq"><span class="nicon">🏠</span><span class="nlbl">Today</span></button>
    <button class="ni" id="n-focus"><span class="nicon">⏱</span><span class="nlbl">Focus</span></button>
    <button class="ni" id="n-regulate"><span class="nicon">🫀</span><span class="nlbl">Regulate</span></button>
    <button class="ni" id="n-habits"><span class="nicon">✓</span><span class="nlbl">Habits</span></button>
    <button class="ni" id="n-wisdom"><span class="nicon">◎</span><span class="nlbl">Wisdom</span></button>
  </nav>
</div>
<script src="focal.js"></script>
</body>
</html>
